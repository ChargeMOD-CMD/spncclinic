name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_SUPABASE_URL: "https://vmpfzcrxwwrrtbdeozdm.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtcGZ6Y3J4d3dycnRiZGVvemRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODcwMDcsImV4cCI6MjA5NTg2MzAwN30.vdBpsP72UPSCjkkWKKdYW3nyilsPyDuyZcAvL03nmDI"
          SUPABASE_URL: "https://vmpfzcrxwwrrtbdeozdm.supabase.co"
          SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtcGZ6Y3J4d3dycnRiZGVvemRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODcwMDcsImV4cCI6MjA5NTg2MzAwN30.vdBpsP72UPSCjkkWKKdYW3nyilsPyDuyZcAvL03nmDI"

      - name: List build output
        run: ls -la dist/client/

      - name: Add SPA fallback (404.html)
        run: cp dist/client/index.html dist/client/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4